kind = "web"
previewPath = "/"
title = "BOKURA Accounting & Bookkeeping"
version = "1.0.0"
id = "artifacts/bokura-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18465

[services.development]
run = "pnpm --filter @workspace/bokura-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bokura-landing", "run", "build" ]
publicDir = "artifacts/bokura-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18465"
BASE_PATH = "/"
